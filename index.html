<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Nexus v6.0 | Interactive Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: oklch(12% 0.015 260);
            --surface: oklch(16% 0.02 260);
            --surface-elevated: oklch(22% 0.025 260);
            --primary: oklch(78% 0.16 195);
            --secondary: oklch(62% 0.22 340);
            --text-high: oklch(98% 0.01 260);
            --text-med: oklch(80% 0.02 260);
            --text-low: oklch(60% 0.03 260);
            --success: oklch(72% 0.18 145);
            --error: oklch(65% 0.25 25);
            --border: oklch(30% 0.03 260 / 0.4);
            --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
            --time-quick: 200ms;
            --time-med: 400ms;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background-color: var(--bg); color: var(--text-high); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), oklch(78% 0.16 195 / 0.05) 0%, transparent 60%); }
        .layout { display: grid; grid-template-columns: 380px 1fr 380px; gap: 1.5rem; padding: 1.5rem; flex: 1; z-index: 1; opacity: 0; transform: translateY(20px); transition: opacity 1s var(--ease-out-quart), transform 1s var(--ease-out-quart); }
        header { padding: 1.5rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10; }
        .sys-identity h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; font-family: 'JetBrains Mono', monospace; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sys-msg { font-size: 0.75rem; color: var(--text-low); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
        .widget { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; position: relative; backdrop-filter: blur(20px); transition: var(--time-med) var(--ease-out-quart); }
        .widget:hover { border-color: var(--primary); transform: translateY(-4px); background: var(--surface-elevated); }
        .widget-title { font-size: 0.75rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--text-low); display: flex; align-items: center; gap: 12px; }
        .metric-card { padding: 1.2rem; background: oklch(100% 0 0 / 0.03); border-radius: 12px; position: relative; }
        .metric-val { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 700; }
        .metric-unit { font-size: 0.8rem; color: var(--text-low); margin-left: 4px; }
        .spin { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .node-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: oklch(100% 0 0 / 0.02); border-radius: 12px; border: 1px solid transparent; transition: var(--time-quick) var(--ease-out-quart); }
        .node-item:hover { background: oklch(100% 0 0 / 0.05); transform: scale(1.02); }
        .node-info { display: flex; align-items: center; gap: 14px; }
        .node-status { width: 8px; height: 8px; border-radius: 50%; background: var(--text-low); transition: background 0.3s, box-shadow 0.3s; }
        .node-status.active { background: var(--success); box-shadow: 0 0 12px var(--success); }
        .toggle { width: 44px; height: 22px; background: oklch(30% 0.02 260); border-radius: 11px; position: relative; transition: 0.3s var(--ease-out-quart); }
        .toggle::after { content: ""; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: var(--text-low); border-radius: 50%; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .toggle.on { background: var(--primary); }
        .toggle.on::after { transform: translateX(22px); background: #fff; }
        .feed { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; overflow-y: auto; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); padding: 15px 0; }
        .feed-item { margin-bottom: 10px; padding: 8px 12px; border-left: 2px solid var(--border); animation: slideIn 0.4s var(--ease-out-quart); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; display: none; }
        .input-field { background: var(--surface); border: 1px solid var(--border); color: var(--text-high); padding: 12px 20px; border-radius: 8px; font-family: 'JetBrains Mono'; width: 350px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--glow); }
        .btn { background: var(--primary); color: var(--bg); border: none; padding: 12px 30px; border-radius: 8px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <header>
        <div class="sys-identity">
            <h1>Nexus Hub v6.0</h1>
            <div class="sys-msg" id="greeting">System initialized...</div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="widget-title" style="letter-spacing: 1px; color: var(--success);">
                <i class="fas fa-circle-notch fa-spin"></i> Online
            </div>
            <button class="btn" style="padding: 6px 12px; font-size: 0.6rem;" onclick="resetAuth()">Reset Security</button>
        </div>
    </header>
    <div class="layout" id="main-layout">
        <aside style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="widget">
                <div class="widget-title"><i class="fas fa-lightbulb"></i> Living Environment</div>
                <div id="lights-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>
            <div class="widget"><div class="widget-header"><div class="widget-title"><i class="fas fa-charging-station"></i> Grid Load</div></div><div class="metric-card"><div style="font-size: 0.6rem; color: var(--text-low); margin-bottom: 5px;">CURRENT POWER</div><div class="metric-val" id="met-power">0<span class="metric-unit">W</span></div></div><div class="metric-card"><div style="font-size: 0.6rem; color: var(--text-low); margin-bottom: 5px;">ESTIMATED BILL</div><div class="metric-val" id="met-cost">0.00<span class="metric-unit">€</span></div></div></div>
        </aside>
        <main class="widget" style="padding: 2rem;">
            <div class="widget-title"><i class="fas fa-microchip"></i> Neural Core Interaction</div>
            <div class="feed" id="neural-feed"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <button class="btn" style="background: var(--surface-elevated); border:1px solid var(--border); color: var(--primary);" onclick="runProtocol('script.analisi_energetica_ia')">Audit IA</button>
                <button class="btn" onclick="runProtocol('script.attiva_gemini_voice')">Voice Core</button>
            </div>
        </main>
        <aside style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="widget"><div class="widget-title"><i class="fas fa-shield-alt"></i> Perimeter Security</div><div id="security-list" style="display: flex; flex-direction: column; gap: 8px;"></div></div>
            <div class="widget"><div class="widget-title"><i class="fas fa-sync" id="dryer-icon"></i> Laundry Status</div><div id="laundry-list" style="display: flex; flex-direction: column; gap: 8px;"></div></div>
        </aside>
    </div>
    <div id="auth-overlay"><i class="fas fa-fingerprint" style="font-size: 3rem; color: var(--primary);"></i><h2 style="font-family: 'JetBrains Mono';">QUANTUM_ACCESS_REQUIRED</h2><p style="color: var(--text-low);">Enter HA Token</p><input type="password" id="token-input" class="input-field" placeholder="Token..."><button class="btn" onclick="saveAuth()">Authorize</button></div>
    <script>
        let HA_TOKEN = localStorage.getItem('ha_token'); const HA_URL = window.location.origin;
        window.addEventListener('mousemove', (e) => { const x = (e.clientX / window.innerWidth) * 100; const y = (e.clientY / window.innerHeight) * 100; document.getElementById('particles').style.setProperty('--mx', x + '%'); document.getElementById('particles').style.setProperty('--my', y + '%'); });
        function init() { if (!HA_TOKEN) { document.getElementById('auth-overlay').style.display = 'flex'; } else { document.getElementById('main-layout').style.opacity = '1'; document.getElementById('main-layout').style.transform = 'translateY(0)'; fetchStates(); setInterval(fetchStates, 5000); } }
        function saveAuth() { const token = document.getElementById('token-input').value; if (token) { localStorage.setItem('ha_token', token); HA_TOKEN = token; location.reload(); } }
        function resetAuth() { localStorage.removeItem('ha_token'); location.reload(); }
        async function fetchStates() { try { const response = await fetch(`${HA_URL}/api/states`, { headers: { 'Authorization': `Bearer ${HA_TOKEN}` } }); const data = await response.json(); updateUI(data); } catch (err) { } }
        function updateUI(data) {
            const power = data.find(e => e.entity_id === 'sensor.potenza_totale_casa')?.state || 0;
            const cost = data.find(e => e.entity_id === 'sensor.costo_bolletta_stimato')?.state || 0;
            document.getElementById('met-power').innerHTML = `${power}<span class="metric-unit">W</span>`;
            document.getElementById('met-cost').innerHTML = `${parseFloat(cost).toFixed(2)}<span class="metric-unit">€</span>`;
            renderList('lights-list', data.filter(e => e.entity_id.includes('switch.luce_') || e.entity_id.includes('light.')));
            renderList('security-list', data.filter(e => e.entity_id.includes('binary_sensor.sensore_vane') || e.entity_id.includes('binary_sensor.sensore_mov')));
            renderList('laundry-list', data.filter(e => e.entity_id.includes('_power') && (e.entity_id.includes('lavatrice') || e.entity_id.includes('asciugatrice'))));
        }
        function renderList(id, entities) {
            const container = document.getElementById(id); container.innerHTML = '';
            entities.forEach(e => {
                const active = e.state === 'on' || e.state === 'home' || parseFloat(e.state) > 0;
                const node = document.createElement('div'); node.className = 'node-item';
                node.innerHTML = `<div class="node-info"><div class="node-status ${active ? 'active' : ''}"></div><span>${e.attributes.friendly_name || e.entity_id}</span></div>`;
                container.appendChild(node);
            });
        }
        init();
    </script>
</body>
</html>
